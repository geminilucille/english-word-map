<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>课标场景词图 · 早餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0ebe0;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 24px 20px 32px;
        }
        .scene-container {
            position: relative;
            background: #fdf7e8;
            border-radius: 32px;
            padding: 16px;
            border: 2px solid #ecd9b4;
        }
        .scene-img {
            width: 100%;
            border-radius: 24px;
            display: block;
        }
        /* 标注按钮样式 */
        .pin {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #5e3a1f;
            cursor: pointer;
            border: 1px solid #d4b87a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: 0.05s linear;
            white-space: nowrap;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(2px);
        }
        .pin:active {
            transform: scale(0.95);
            background: #f5e5c8;
        }
        .pin-emoji {
            font-size: 18px;
        }
        .click-hint {
            text-align: center;
            font-size: 13px;
            color: #b69b6e;
            margin-top: 16px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #b59f7a;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #ecd9b4;
        }
        @media (max-width: 600px) {
            .pin { padding: 4px 12px; font-size: 13px; }
            .pin-emoji { font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="scene-container" style="position: relative;" id="sceneContainer">
        <!-- 你的图片 -->
        <img src="breakfast.png" alt="早餐餐桌" class="scene-img" id="sceneImg">
        
        <!-- 标注按钮会通过JS动态添加 -->
    </div>

    <div class="click-hint">
        🔊 点击食物标签，听英语发音
    </div>
    <div class="footer">
        ✨ 每天10分钟，指着说、点着听 · 亲子英语启蒙
    </div>
</div>

<script>
    // ================= 坐标数据（基于原图 1142 × 2047） =================
    const originalWidth = 1142;
    const originalHeight = 2047;
    
    // 位置偏移：下移3cm ≈ 113px（按96dpi计算），右移2cm ≈ 75px
    // 你可以根据需要调整这两个值
    const offsetX = 75;   // 右移 2cm ≈ 75px
    const offsetY = 113;  // 下移 3cm ≈ 113px
    
    const foods = [
        { word: "bread", emoji: "🍞", x: 300, y: 450, w: 420, h: 260 },
        { word: "milk", emoji: "🥛", x: 950, y: 400, w: 400, h: 260 },
        { word: "juice", emoji: "🧃", x: 200, y: 1150, w: 420, h: 350 },
        { word: "egg", emoji: "🥚", x: 900, y: 1190, w: 400, h: 420 },
        { word: "cereal", emoji: "🥣", x: 250, y: 1800, w: 420, h: 350 },
        { word: "yogurt", emoji: "🥄", x: 850, y: 1850, w: 400, h: 350 }
    ];

    let bestVoice = null;
    
    // 获取最佳音色
    function initBestVoice() {
        const voices = window.speechSynthesis.getVoices();
        bestVoice = voices.find(v => v.name.includes('Google') && v.lang === 'en-US') ||
                    voices.find(v => v.name.includes('Jenny') && v.lang === 'en-US') ||
                    voices.find(v => v.name.includes('Microsoft') && v.lang === 'en-US') ||
                    voices.find(v => v.lang === 'en-US');
    }
    
    if (window.speechSynthesis.getVoices().length > 0) {
        initBestVoice();
    } else {
        window.speechSynthesis.onvoiceschanged = initBestVoice;
    }
    
    // 发音功能（egg 只发正常音，不加后缀）
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        // 不再修改 egg，直接发原音
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 0.85;
        if (bestVoice) utterance.voice = bestVoice;
        window.speechSynthesis.speak(utterance);
    }

    // 计算缩放比例
    function getScale() {
        const img = document.getElementById('sceneImg');
        if (!img || !img.clientWidth) return { scaleX: 1, scaleY: 1 };
        return {
            scaleX: img.clientWidth / originalWidth,
            scaleY: img.clientHeight / originalHeight
        };
    }

    // 创建所有标注按钮（位置已加偏移）
    function createPins() {
        const container = document.getElementById('sceneContainer');
        const img = document.getElementById('sceneImg');
        if (!container || !img) return;
        
        // 清除旧的标注
        const oldPins = container.querySelectorAll('.pin');
        oldPins.forEach(pin => pin.remove());
        
        const { scaleX, scaleY } = getScale();
        
        foods.forEach(food => {
            // 在原坐标基础上增加偏移
            const leftPos = (food.x + offsetX) * scaleX;
            const topPos = (food.y + offsetY) * scaleY;
            
            const pin = document.createElement('div');
            pin.className = 'pin';
            pin.style.left = leftPos + 'px';
            pin.style.top = topPos + 'px';
            pin.innerHTML = `<span class="pin-emoji">${food.emoji}</span> ${food.word}`;
            pin.addEventListener('click', (e) => {
                e.stopPropagation();
                speak(food.word);
                // 视觉反馈
                const originalBg = pin.style.background;
                pin.style.background = '#d4e0c0';
                setTimeout(() => { pin.style.background = originalBg; }, 150);
            });
            container.appendChild(pin);
        });
    }

    // 图片加载完成后创建标注
    const img = document.getElementById('sceneImg');
    
    // 使用轮询等待图片尺寸稳定
    function waitForImageAndCreate() {
        if (img.clientWidth > 0 && img.clientHeight > 0) {
            createPins();
        } else {
            setTimeout(waitForImageAndCreate, 50);
        }
    }
    
    if (img.complete && img.clientWidth > 0) {
        createPins();
    } else {
        img.onload = () => {
            createPins();
        };
    }
    
    // 窗口大小改变时重新计算位置
    window.addEventListener('resize', () => {
        createPins();
    });
    
    img.onerror = () => {
        alert('图片加载失败，请确认图片文件名为 breakfast.png 并放在同一文件夹下');
    };
</script>
</body>
</html>
